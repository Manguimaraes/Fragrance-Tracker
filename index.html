function getSeason() {
  const m = new Date().getMonth();
  if (m >= 2 && m <= 4) return "spring";
  if (m >= 5 && m <= 7) return "summer";
  if (m >= 8 && m <= 10) return "autumn";
  return "winter";
}
function seededRandom(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }
function getDayOfYear() { const now = new Date(); return Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000); }

function getClient() {
  const url = localStorage.getItem('supabase-url');
  const key = localStorage.getItem('supabase-anon-key');
  if (!url || !key) return null;
  return window.supabase.createClient(url, key);
}

function rowToPerfume(row, logs = []) {
  return {
    id: row.id, name: row.name, house: row.house,
    description: row.description || '', notes: row.notes || [],
    categories: row.categories || [], year: row.year,
    perfumer: row.perfumer, concentration: row.concentration,
    photoUrl: row.photo_url, enriched: row.enriched || false,
    archived: row.archived || false, archiveReason: row.archive_reason,
    archivedAt: row.archived_at, lastUsed: row.last_used,
    rating: row.rating || null, personalNotes: row.personal_notes || [],
    usageHistory: logs
      .filter(l => l.perfume_id === row.id)
      .sort((a, b) => a.logged_at.localeCompare(b.logged_at))
      .map(l => ({ who: l.who, date: l.logged_at, logId: l.id }))
  };
}

function perfumeToRow(p) {
  return {
    id: p.id, name: p.name, house: p.house,
    description: p.description || null, notes: p.notes || [],
    categories: p.categories || [], year: p.year || null,
    perfumer: p.perfumer || null, concentration: p.concentration || null,
    photo_url: p.photoUrl || null, enriched: p.enriched || false,
    archived: p.archived || false, archive_reason: p.archiveReason || null,
    archived_at: p.archivedAt || null, last_used: p.lastUsed || null,
    rating: p.rating || null, personal_notes: p.personalNotes || [],
    updated_at: new Date().toISOString()
  };
}

async function loadFromSupabase() {
  const sb = getClient(); if (!sb) return null;
  const [{ data: rows, error: e1 }, { data: logs, error: e2 }] = await Promise.all([
    sb.from('perfumes').select('*'),
    sb.from('spray_logs').select('*').order('logged_at', { ascending: true })
  ]);
  if (e1 || e2) { console.error('Supabase load error', e1, e2); return null; }
  return rows.map(r => rowToPerfume(r, logs || []));
}

async function upsertPerfume(p) {
  const sb = getClient(); if (!sb) return null;
  const { error } = await sb.from('perfumes').upsert(perfumeToRow(p));
  if (error) { console.error('Supabase upsert error', error); return error; }
  return null;
}

async function insertPerfumeToDb(p) {
  const sb = getClient(); if (!sb) return;
  const row = perfumeToRow(p); delete row.updated_at;
  const { error } = await sb.from('perfumes').insert(row);
  if (error) console.error('Supabase insert error', error);
}

async function logSprayToDb(perfumeId, who) {
  const sb = getClient(); if (!sb) return null;
  const now = new Date().toISOString();
  const { data, error } = await sb.from('spray_logs')
    .insert({ perfume_id: perfumeId, who, logged_at: now })
    .select().single();
  if (error) { console.error('Supabase spray error', error); return null; }
  await sb.from('perfumes').update({ last_used: now, updated_at: now }).eq('id', perfumeId);
  return data;
}

async function deletePerfumeFromDb(pid) {
  const sb = getClient(); if (!sb) return;
  await sb.from('spray_logs').delete().eq('perfume_id', pid);
  const { error } = await sb.from('perfumes').delete().eq('id', pid);
  if (error) console.error('Supabase delete error', error);
}

async function removeSprayFromDb(logId, perfumeId) {
  const sb = getClient(); if (!sb) return null;
  await sb.from('spray_logs').delete().eq('id', logId);
  const { data: remaining } = await sb.from('spray_logs')
    .select('logged_at').eq('perfume_id', perfumeId)
    .order('logged_at', { ascending: false }).limit(1);
  const lastUsed = remaining && remaining.length ? remaining[0].logged_at : null;
  await sb.from('perfumes').update({ last_used: lastUsed, updated_at: new Date().toISOString() }).eq('id', perfumeId);
  return lastUsed;
}

async function migrateToSupabase(perfumes) {
  const sb = getClient(); if (!sb) return false;
  const { count, error: ce } = await sb.from('perfumes').select('*', { count: 'exact', head: true });
  if (ce) { console.error('Migration count error', ce); return false; }
  if (count > 0) return true;
  // Insert in batches of 25 to avoid request size limits
  const BATCH = 25;
  const rows = perfumes.map(perfumeToRow);
  for (let i = 0; i < rows.length; i += BATCH) {
    const { error } = await sb.from('perfumes').insert(rows.slice(i, i + BATCH));
    if (error) { console.error('Migration batch error at', i, error); return false; }
  }
  const logs = perfumes.flatMap(p => (p.usageHistory || []).map(h => ({
    perfume_id: p.id, who: h.who, logged_at: h.date
  })));
  for (let i = 0; i < logs.length; i += BATCH) {
    const { error } = await sb.from('spray_logs').insert(logs.slice(i, i + BATCH));
    if (error) { console.error('Migration logs batch error at', i, error); return false; }
  }
  return true;
}

  // Load data
  useEffect(() => {
    async function load() {
      const sb = getClient();
      if (sb && navigator.onLine) {
        setIsSyncing(true);
        try {
          let data = await loadFromSupabase();
          if (data !== null) {
            if (data.length === 0) {
              // First run: use localStorage if it looks intact, else re-seed from BASE_PERFUMES
              const localData = store.get(SK);
              const fullSeed = BASE_PERFUMES.map(p => {
                const e = ENRICHED_DATA[p.name];
                return e ? {...p,...e,enriched:true,usageHistory:[]} : {...p,description:"",notes:[],categories:[],enriched:false,usageHistory:[]};
              });
              const seed = (localData && localData.length >= BASE_PERFUMES.length) ? localData : fullSeed;
              const ok = await migrateToSupabase(seed);
              if (ok) data = await loadFromSupabase(); else data = seed;
            }
            setPerfumes(data);
            store.set(SK, data);
            setSyncStatus("ok");
          } else {
            // Supabase unreachable — fall back to localStorage cache
            const cached = store.get(SK);
            if (cached) setPerfumes(cached);
            setSyncStatus("error");
          }
        } catch(err) {
          console.error("Load error", err);
          const cached = store.get(SK);
          if (cached) setPerfumes(cached);
          setSyncStatus("error");
        } finally { setIsSyncing(false); }
      } else {
        // No Supabase configured, or offline: load from localStorage
        let data = store.get(SK);
        if (!data) {
          data = BASE_PERFUMES.map(p => {
            const e = ENRICHED_DATA[p.name];
            return e ? {...p,...e,enriched:true,usageHistory:[]} : {...p,description:"",notes:[],categories:[],enriched:false,usageHistory:[]};
          });
          store.set(SK, data);
        }
        setPerfumes(data);
      }
      setReady(true);
    }

    if (!sb) return;

    const channel = sb.channel('db-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'perfumes' }, async (payload) => {
        if (payload.eventType === 'DELETE') {
          setPerfumes(prev => {
            const next = prev.filter(p => p.id !== payload.old.id);
            store.set(SK, next);
            return next;
          });
          setSelected(prev => prev?.id === payload.old.id ? null : prev);
        } else {
          const { data: row } = await sb.from('perfumes').select('*').eq('id', payload.new.id).single();
          const { data: logs } = await sb.from('spray_logs').select('*').eq('perfume_id', payload.new.id).order('logged_at', { ascending: true });
          if (row) {
            const updated = rowToPerfume(row, logs || []);
            setPerfumes(prev => {
              const next = prev.find(p => p.id === updated.id)
                ? prev.map(p => p.id === updated.id ? updated : p)
                : [...prev, updated];
              store.set(SK, next);
              return next;
            });
            setSelected(prev => prev?.id === updated.id ? updated : prev);
          }
        }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'spray_logs' }, async (payload) => {
        const perfumeId = payload.new?.perfume_id || payload.old?.perfume_id;
        if (!perfumeId) return;
        const { data: row } = await sb.from('perfumes').select('*').eq('id', perfumeId).single();
        const { data: logs } = await sb.from('spray_logs').select('*').eq('perfume_id', perfumeId).order('logged_at', { ascending: true });
        if (row) {

          setPerfumes(prev => {
            const next = prev.map(p => p.id === perfumeId ? updated : p);
            store.set(SK, next);
            return next;
          });
          setSelected(prev => prev?.id === perfumeId ? updated : prev);
        }
      })
      .subscribe();

    return () => { sb.removeChannel(channel); };

  const t = {

  const S = {

  // DETAIL VIEW
  if (selected) {

    return (

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,padding:"12px 14px",background:t.pillBg,borderRadius:10}}>
              <div><p style={{margin:0,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:t.textMuted}}>Last worn</p><p style={{margin:"2px 0 0",fontSize:14,fontWeight:600,color:t.text}}>{formatDate(p.lastUsed) || "Never"}</p></div>
              <button style={{...S.btn,fontSize:12,padding:"8px 14px",background:canWrite?t.sage:"#e0e0e0",color:canWrite?"#2a3a2a":t.textMuted,border:"none",cursor:canWrite?"pointer":"not-allowed"}} onClick={() => canWrite && sprayToday(p.id)} disabled={!canWrite}>{canWrite ? `${profile} sprayed today` : "Offline"}</button>
            </div>
          )}

          {p.description && <p style={S.dDesc}>{p.description}</p>}
          {(p.notes||[]).length > 0 && <div style={{marginBottom:20}}><span style={S.label}>Notes</span><div>{p.notes.map(n => <span key={n} style={S.note}>{n}</span>)}</div></div>}

          {/* Usage history */}
          {(p.usageHistory||[]).length > 0 && (
            <div style={{marginBottom:20}}>
              <span style={S.label}>Usage History</span>
              <div style={{borderTop:`1px solid ${t.cardBorder}`,paddingTop:10}}>
                {[...(p.usageHistory||[])].map((e,i) => [e,i]).reverse().map(([entry, origIdx], dispIdx) => (
                  <div key={origIdx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:dispIdx < p.usageHistory.length - 1 ? `1px solid ${t.cardBorder}` : "none"}}>
                    <span style={{fontSize:13,fontWeight:600,color:t.text}}>{entry.who}</span>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:12,color:t.textMuted}}>{formatDate(entry.date)}</span>
                      <button onClick={() => removeHistory(p.id, origIdx)} style={{background:"none",border:"none",fontSize:11,color:t.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",padding:"2px 6px",borderRadius:4}}>remove</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {!p.enriched && <div style={S.banner}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>Not yet enriched.</span><button style={{...S.btn,fontSize:11,padding:"5px 12px",background:t.bannerText,color:"#fff",border:"none"}} onClick={() => enrichPerfume(p)} disabled={enriching===p.id}>{enriching===p.id?"Enriching...":"Enrich Now"}</button></div></div>}

          {/* Personal notes */}
          <div style={{marginBottom:20}}>
            <span style={S.label}>Personal Notes</span>
            {(p.personalNotes||[]).length > 0 && (
              <div style={{borderTop:"1px solid "+t.cardBorder,paddingTop:10,marginBottom:12}}>
                {[...(p.personalNotes||[])].reverse().map((entry, dispIdx) => {
                  const origIdx = (p.personalNotes.length - 1) - dispIdx;
                  return (
                    <div key={origIdx} style={{marginBottom:10,paddingBottom:10,borderBottom:dispIdx < p.personalNotes.length - 1 ? "1px solid "+t.cardBorder : "none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:600,color:t.accent}}>{entry.who}</span>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,color:t.textMuted}}>{formatDate(entry.date)}</span>
                          <button onClick={() => removeNote(p.id, origIdx)} style={{background:"none",border:"none",fontSize:11,color:t.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",padding:"2px 6px",borderRadius:4}}>remove</button>
                        </div>
                      </div>
                      <p style={{margin:0,fontSize:13,color:t.text,lineHeight:1.6}}>{entry.text}</p>
                    </div>
                  );
                })}
              </div>
            )}
            <textarea
              style={{...S.input,minHeight:70,resize:"vertical",marginBottom:6}}
              placeholder={"Add a note as " + profile + "..."}
              value={noteInput}
              onChange={e => setNoteInput(e.target.value)}
            />
            <button
              style={{...S.btn,background:noteInput.trim()?t.plum:"transparent",color:noteInput.trim()?"#fff":t.textMuted,border:"1.5px solid "+(noteInput.trim()?t.plum:t.inputBorder),fontSize:12,padding:"8px 16px"}}
              onClick={() => addNote(p.id, noteInput)}
              disabled={!noteInput.trim()}
            >Add note</button>
          </div>

          {enriching === p.id && <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><div style={S.spinner}></div><span style={{fontSize:13,color:t.textSub}}>Searching for fragrance data...</span></div>}

          <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
            <input type="file" accept="image/*" capture="environment" ref={fileRef} style={{display:"none"}} onChange={e => handlePhoto(e, p.id)}/>
            <button style={S.btn} onClick={() => { setForm({ name:p.name, house:p.house, description:p.description||"", notes:Array.isArray(p.notes)?p.notes.join(", "):"", categories:p.categories||[], year:p.year?String(p.year):"", perfumer:p.perfumer||"", concentration:p.concentration||"" }); setShowEdit(true); }}>Edit</button>
            <button style={S.btn} onClick={() => fileRef.current?.click()}>{p.photoUrl ? "Change Photo" : "Upload Photo"}</button>
            <button style={S.btn} onClick={() => searchPhotos(p)} disabled={photoSearch.loading && photoSearch.forId === p.id}>{photoSearch.loading && photoSearch.forId === p.id ? "Searching..." : "Find Photo Online"}</button>
            {p.enriched && <button style={{...S.btn,color:t.textMuted,borderColor:t.inputBorder}} onClick={() => enrichPerfume(p)} disabled={enriching===p.id}>{enriching===p.id?"Refreshing...":"Re-enrich"}</button>}
          </div>

          {photoSearch.forId === p.id && (
            <div style={{marginTop:14,background:t.pillBg,borderRadius:12,padding:"12px 14px"}}>
              {photoSearch.loading
                ? <div style={{display:"flex",alignItems:"center",gap:8}}><div style={S.spinner}></div><span style={{fontSize:12,color:t.textSub}}>Looking up image...</span></div>
                : photoSearch.results.length > 0
                  ? <div>
                      <span style={{...S.label,marginBottom:8,display:"block"}}>Select a photo</span>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:8}}>
                        {photoSearch.results.map((url,i) => <div key={i} style={{aspectRatio:"1",borderRadius:8,overflow:"hidden",border:`2px solid ${t.inputBorder}`,cursor:"pointer",background:t.card}} onClick={() => selectPhoto(p.id,url)}><img src={url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/></div>)}
                      </div>
                      <button style={{...S.btn,fontSize:11,marginTop:8,color:t.textMuted}} onClick={() => setPhotoSearch({loading:false,results:[],error:null,forId:null})}>Dismiss</button>
                    </div>
                  : <div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                        <span style={S.label}>Paste Fragrantica URL</span>
                        <a href={`https://www.fragrantica.com/search/?query=${encodeURIComponent(p.name+' '+p.house)}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:t.accent,textDecoration:"none"}}>Search on Fragrantica →</a>
                      </div>
                      <p style={{fontSize:11,color:t.textMuted,margin:"0 0 8px",lineHeight:1.5}}>Find the perfume on Fragrantica, copy the page URL, paste it here.</p>
                      <div style={{display:"flex",gap:6}}>
                        <input style={{...S.input,margin:0,flex:1,fontSize:12}} placeholder="https://www.fragrantica.com/perfume/..." onKeyDown={e => e.key === "Enter" && searchPhotosByUrl(p.id, e.target.value)} id={`frag-url-${p.id}`}/>
                        <button style={{...S.btn,fontSize:11,whiteSpace:"nowrap"}} onClick={() => searchPhotosByUrl(p.id, document.getElementById(`frag-url-${p.id}`).value)}>Get Image</button>
                      </div>
                      {photoSearch.error && <p style={{fontSize:11,color:"#c0392b",margin:"6px 0 0"}}>{photoSearch.error}</p>}
                      <button style={{...S.btn,fontSize:11,marginTop:8,color:t.textMuted,borderColor:"transparent"}} onClick={() => setPhotoSearch({loading:false,results:[],error:null,forId:null})}>Cancel</button>
                    </div>
              }
            </div>
          )}

          {p.archived ? (
            <div style={{marginTop:20,background:t.pillBg,borderRadius:12,padding:"14px 16px"}}>
              <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:t.textMuted}}>Archived</p>
              <p style={{margin:"0 0 8px",fontSize:13,color:t.textSub}}>{p.archiveReason}</p>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button style={{...S.btn,fontSize:11,padding:"6px 14px"}} onClick={() => { doUnarchive(p.id); setSelected({...p,archived:false,archiveReason:null,archivedAt:null}); }}>Restore to Collection</button>
                <button style={{...S.btn,fontSize:11,padding:"6px 14px",color:"#c0392b",borderColor:"#f5c6c6"}} onClick={() => setShowDeleteConfirm(true)}>Delete permanently</button>
              </div>
            </div>
          ) : (
            <div style={{marginTop:20,borderTop:`1px solid ${t.cardBorder}`,paddingTop:16,display:"flex",gap:12,alignItems:"center"}}>
              <button style={{...S.btn,fontSize:11,color:t.textMuted,borderColor:t.inputBorder}} onClick={() => openArchiveModal(p)}>Archive this perfume</button>
              <button style={{...S.btn,fontSize:11,color:"#c0392b",borderColor:"#f5c6c6"}} onClick={() => setShowDeleteConfirm(true)}>Delete permanently</button>
            </div>
          )}

          {showDeleteConfirm && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:t.card,borderRadius:16,padding:24,width:"100%",maxWidth:380}}>
                <h3 style={{margin:"0 0 8px",fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Delete {p.name}?</h3>
                <p style={{margin:"0 0 20px",fontSize:13,color:t.textSub,lineHeight:1.6}}>This removes it permanently, including all spray history. It cannot be undone.</p>
                <div style={{display:"flex",gap:8}}>
                  <button style={{...S.btn,flex:1}} onClick={() => setShowDeleteConfirm(false)}>Cancel</button>
                  <button style={{...S.btn,flex:1,background:"#c0392b",color:"#fff",border:"none"}} onClick={() => doDelete(p.id)}>Delete</button>
                </div>
              </div>
            </div>
          )}

          {archiveModal?.id === p.id && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:t.card,borderRadius:16,padding:24,width:"100%",maxWidth:400}}>
                <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Archive {p.name}?</h3>
                <p style={{margin:"0 0 14px",fontSize:13,color:t.textSub}}>You can restore it anytime.</p>
                <span style={S.label}>Reason</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>{["Gave away","Finished","Sold","Broken / spilled","Lost interest"].map(r => <button key={r} onClick={() => setArchiveReason(r)} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${t.inputBorder}`,background:archiveReason===r?t.magenta:"transparent",color:archiveReason===r?"#fff":t.textSub,fontSize:12,cursor:"pointer",fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{r}</button>)}</div>
                <input style={S.input} placeholder="Or type a custom reason..." value={archiveReason} onChange={e => setArchiveReason(e.target.value)}/>
                <div style={{display:"flex",gap:8}}><button style={{...S.btn,flex:1}} onClick={() => window.history.back()}>Cancel</button><button style={{...S.btn,flex:1,background:t.accent,color:"#fff",border:"none"}} onClick={doArchive}>Archive</button></div>
              </div>
            </div>
          )}
        </div>

      {/* Edit modal */}
      {showEdit && (
        <div style={{position:"fixed",inset:0,background:"rgba(42,30,36,.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:t.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 20px rgba(85,62,78,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 18px 10px"}}>
              <h2 style={{fontSize:17,fontWeight:700,margin:0,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Edit Perfume</h2>
              <button style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:t.textMuted}} onClick={() => setShowEdit(false)}>x</button>
            </div>
            <div style={{padding:"0 18px 20px",overflowY:"auto",flex:1}}>
              <input style={S.input} placeholder="Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <input style={S.input} placeholder="House *" value={form.house} onChange={e=>setForm(p=>({...p,house:e.target.value}))}/>
              <textarea style={{...S.input,minHeight:70,resize:"vertical"}} placeholder="Description" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
              <input style={S.input} placeholder="Notes (comma-separated)" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
              <div style={{display:"flex",gap:8}}>
                <input style={{...S.input,flex:1}} placeholder="Year" value={form.year} onChange={e=>setForm(p=>({...p,year:e.target.value}))}/>
                <input style={{...S.input,flex:2}} placeholder="Concentration" value={form.concentration} onChange={e=>setForm(p=>({...p,concentration:e.target.value}))}/>
              </div>
              <input style={S.input} placeholder="Perfumer" value={form.perfumer} onChange={e=>setForm(p=>({...p,perfumer:e.target.value}))}/>
              <span style={S.label}>Categories</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>{ALL_CATEGORIES.map(c => <button key={c} onClick={()=>setForm(p=>({...p,categories:p.categories.includes(c)?p.categories.filter(x=>x!==c):[...p.categories,c]}))} style={{padding:"5px 12px",borderRadius:20,border:"1.5px solid "+t.inputBorder,background:form.categories.includes(c)?t.plum:"transparent",color:form.categories.includes(c)?"#fff":t.textSub,fontSize:11,cursor:"pointer",fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{c}</button>)}</div>
              <button style={{...S.btn,background:t.accent,color:"#fff",border:"none",width:"100%",padding:"12px 0"}} onClick={saveEdit}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* Chat bubble */}
      <button onClick={() => setShowChat(true)} style={{position:"fixed",bottom:28,right:20,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#553e4e 0%,#e0479e 100%)",border:"none",boxShadow:"0 4px 16px rgba(85,62,78,.4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900}}>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M20 2H4a2 2 0 00-2 2v12a2 2 0 002 2h4l4 4 4-4h4a2 2 0 002-2V4a2 2 0 00-2-2z" stroke="white" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>
      </button>

      {showChat && (
        <div style={{position:"fixed",inset:0,background:"rgba(42,30,36,.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={() => setShowChat(false)}>
          <div style={{background:t.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,height:"72vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 20px rgba(85,62,78,.2)"}} onClick={e => e.stopPropagation()}>
            <div style={{padding:"16px 18px 12px",borderBottom:"1px solid "+t.cardBorder,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{margin:0,fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Fragrance Advisor</p>
                <p style={{margin:"2px 0 0",fontSize:11,color:t.textMuted}}>Recommendations from your collection</p>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {chatMessages.length > 0 && <button onClick={() => setChatMessages([])} style={{background:"none",border:"none",fontSize:11,color:t.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Clear</button>}
                <button onClick={() => setShowChat(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:t.textMuted,lineHeight:1}}>x</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:10}}>
              {chatMessages.length === 0 && <p style={{fontSize:13,color:t.textMuted,lineHeight:1.65,marginTop:8,textAlign:"center"}}>Tell me about the occasion, your mood, or the kind of scent you are after. I will recommend something from your collection.</p>}
              {chatMessages.map((m,i) => (
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"4px 16px 16px 16px",background:m.role==="user"?"linear-gradient(135deg,#553e4e,#e0479e)":t.pillBg,color:m.role==="user"?"#fff":t.text,fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              ))}
              {chatLoading && (
                <div style={{display:"flex",justifyContent:"flex-start"}}>
                  <div style={{padding:"10px 14px",borderRadius:"4px 16px 16px 16px",background:t.pillBg,display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0s infinite"}}/>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0.2s infinite"}}/>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0.4s infinite"}}/>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
            <div style={{padding:"12px 18px",borderTop:"1px solid "+t.cardBorder,display:"flex",gap:8,background:t.card}}>
              <input style={{...S.input,margin:0,flex:1,fontSize:13,padding:"10px 14px"}} placeholder="What are you looking for today?" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key==="Enter" && !e.shiftKey && sendChat()} disabled={chatLoading}/>
              <button onClick={sendChat} disabled={chatLoading || !chatInput.trim()} style={{padding:"10px 18px",borderRadius:10,border:"none",background:chatInput.trim()?"linear-gradient(135deg,#553e4e,#e0479e)":t.pillBg,color:chatInput.trim()?"#fff":t.textMuted,fontSize:13,fontWeight:600,cursor:chatInput.trim()?"pointer":"default",fontFamily:"'DM Sans',sans-serif"}}>Send</button>
            </div>
          </div>
        </div>
      )}
    </div>
    );
  }

  // MAIN VIEW
  return (
    <div style={S.wrap}>
      <div style={{paddingTop:20,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <h1 style={{fontSize:26,fontWeight:700,letterSpacing:"-0.5px",margin:0,color:t.text,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{showArchived ? "Archive" : "Fragrance Collection"}</h1>
            <span style={{fontSize:13,fontWeight:500,color:t.textMuted,background:t.pillBg,borderRadius:20,padding:"2px 10px"}}>{showArchived ? archiveCount : activeCount}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button style={{background:"none",border:"none",fontSize:13,color:t.accent,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}} onClick={() => { setProfile(null); localStorage.removeItem("fragrance-profile"); }}>{profile}</button>
            <button style={{background:"none",border:"none",fontSize:13,color:t.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:500}} onClick={() => openSettings()}>Settings</button>
          </div>
        </div>
        {isSyncing && <p style={{fontSize:11,color:t.textMuted,margin:"8px 0 0",fontStyle:"italic"}}>Syncing collection...</p>}
        {!isSyncing && syncStatus === "error" && <p style={{fontSize:11,color:"#c0392b",margin:"8px 0 0"}}>Could not reach Supabase. Showing cached data.</p>}
        {supabaseConfigured && !isOnline && (
          <div style={{marginTop:10,background:"#fff8e1",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#7d6608",fontWeight:500}}>
            You're offline. Browse freely — adding, spraying, and archiving are paused until you're back online.
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:3,marginBottom:16,background:t.pillBg,borderRadius:10,padding:3}}>
        <button style={{flex:1,padding:"10px 0",border:"none",background:t.card,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",color:t.text,fontFamily:"'DM Sans',sans-serif",boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>Collection</button>
        <button style={{flex:1,padding:"10px 0",border:"none",background:"transparent",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",color:t.textSub,fontFamily:"'DM Sans',sans-serif"}} onClick={() => openAdd()}>+ Add</button>
      </div>

      {/* Daily pick popup */}
      {showDailyPop && dailyPick && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={() => setShowDailyPop(false)}>
          <div style={{width:"100%",maxWidth:380}} onClick={e => e.stopPropagation()}>
            <p style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(255,255,255,.5)",marginBottom:10}}>Today's Pick</p>
            <div style={S.dailyCard} onClick={() => { setShowDailyPop(false); openDetail(perfumes.find(p => p.id === dailyPick.id) || dailyPick); }}>
              <p style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(255,255,255,.5)",margin:"0 0 4px"}}>{dailyPick.house}</p>
              <p style={{fontSize:22,fontWeight:700,margin:"0 0 10px",color:"#fff",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{dailyPick.name}</p>
              {dailyPick.description && <p style={{fontSize:13,lineHeight:1.6,color:"rgba(255,255,255,.7)",margin:"0 0 14px"}}>{dailyPick.description.slice(0,150)}...</p>}
              <p style={{fontSize:11,color:"rgba(255,255,255,.4)",fontStyle:"italic",margin:0}}>{dailyPick.reason}</p>
            </div>
            <div style={{display:"flex",gap:6,marginTop:12}}>{["random","seasonal"].map(m => <button key={m} onClick={() => setDailyMode(m)} style={{padding:"8px 14px",borderRadius:8,border:"1.5px solid rgba(255,255,255,.2)",background:dailyMode===m?"#fff":"transparent",color:dailyMode===m?t.grape:"rgba(255,255,255,.6)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{m==="random"?"Random":`Seasonal (${getSeason()})`}</button>)}</div>
            <button onClick={() => setShowDailyPop(false)} style={{marginTop:14,width:"100%",padding:"12px 0",borderRadius:8,border:"none",background:"rgba(255,255,255,.12)",color:"rgba(255,255,255,.6)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Dismiss</button>
          </div>
        </div>
      )}

      {/* Settings modal */}
      {showSettings && (
        <div style={S.overlay}><div style={S.modal}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 18px 10px"}}>
            <h2 style={{fontSize:17,fontWeight:700,margin:0,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Settings</h2>
            <button style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:t.textMuted}} onClick={() => window.history.back()}>✕</button>
          </div>
          <div style={{padding:"0 18px 20px",overflowY:"auto",flex:1}}>
            <span style={S.label}>Anthropic API Key</span>
            <p style={{fontSize:12,color:t.textMuted,margin:"0 0 8px"}}>Required for Enrich and Auto-fill. Get one at console.anthropic.com</p>
            <input style={S.input} type="password" placeholder="sk-ant-..." value={apiKey} onChange={e => saveApiKey(e.target.value)}/>
            <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
            <span style={S.label}>Image Search</span>
            <p style={{fontSize:12,color:t.textMuted,margin:"0 0 4px"}}>Uses your Anthropic key above — no extra setup needed. Searches Fragrantica for bottle images.</p>
            <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
            <span style={S.label}>Supabase URL</span>
            <p style={{fontSize:12,color:t.textMuted,margin:"0 0 8px"}}>Your project URL. Find it in Supabase → Project Settings → API.</p>
            <input style={S.input} type="text" placeholder="https://xxxx.supabase.co" value={supabaseUrl} onChange={e => saveSupabaseUrl(e.target.value)}/>
            <span style={S.label}>Supabase Anon Key</span>
            <p style={{fontSize:12,color:t.textMuted,margin:"0 0 8px"}}>The public anon key. Same page as the URL above.</p>
            <input style={S.input} type="password" placeholder="eyJ..." value={supabaseKey} onChange={e => saveSupabaseKey(e.target.value)}/>
            {supabaseConfigured && <p style={{fontSize:12,color:t.sage,margin:"4px 0 0",fontWeight:600}}>Supabase connected. Both keys are saved locally on this device only.</p>}
            {supabaseConfigured && <p style={{fontSize:11,color:t.textMuted,margin:"6px 0 0"}}>Reload the app to trigger a fresh sync after changing these values.</p>}
          </div>
        </div></div>
      )}

      {/* Add form */}
      {showAdd && (
        <div style={S.overlay}><div style={S.modal}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 18px 10px"}}>
            <h2 style={{fontSize:17,fontWeight:700,margin:0,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Add Perfume</h2>
            <button style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:t.textMuted}} onClick={() => window.history.back()}>✕</button>
          </div>
          <div style={{padding:"0 18px 20px",overflowY:"auto",flex:1}}>
            <input style={S.input} placeholder="Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
            <input style={S.input} placeholder="House *" value={form.house} onChange={e=>setForm(p=>({...p,house:e.target.value}))}/>
            {form.name.trim() && form.house.trim() && (
              <button style={{...S.btn,width:"100%",marginBottom:12,padding:"10px 0",background:enrichingForm?"transparent":t.sage,color:enrichingForm?t.textSub:"#fff",border:enrichingForm?`1.5px solid ${t.inputBorder}`:"none"}} onClick={enrichForm} disabled={enrichingForm}>
                {enrichingForm ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span style={{...S.spinner,width:14,height:14,display:"inline-block"}}></span> Enriching...</span> : "Auto-fill from web"}
              </button>
            )}
            {enrichError && <p style={{fontSize:11,color:"#c0392b",margin:"-6px 0 10px",lineHeight:1.5}}>{enrichError}</p>}
            <textarea style={{...S.input,minHeight:70,resize:"vertical"}} placeholder="Description" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
            <input style={S.input} placeholder="Notes (comma-separated)" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
            <div style={{display:"flex",gap:8}}><input style={{...S.input,flex:1}} placeholder="Year" value={form.year} onChange={e=>setForm(p=>({...p,year:e.target.value}))}/><input style={{...S.input,flex:2}} placeholder="Concentration" value={form.concentration} onChange={e=>setForm(p=>({...p,concentration:e.target.value}))}/></div>
            <input style={S.input} placeholder="Perfumer" value={form.perfumer} onChange={e=>setForm(p=>({...p,perfumer:e.target.value}))}/>
            <span style={S.label}>Categories</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{ALL_CATEGORIES.map(c => <button key={c} onClick={()=>setForm(p=>({...p,categories:p.categories.includes(c)?p.categories.filter(x=>x!==c):[...p.categories,c]}))} style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${t.inputBorder}`,background:form.categories.includes(c)?t.plum:"transparent",color:form.categories.includes(c)?"#fff":t.textSub,fontSize:11,cursor:"pointer",fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{c}</button>)}</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}><input type="file" accept="image/*" id="np" style={{display:"none"}} onChange={e=>handlePhoto(e,"new")}/><button style={S.btn} onClick={()=>document.getElementById("np")?.click()}>Add Photo</button>{form.photoUrl && <img src={form.photoUrl} style={{width:48,height:48,borderRadius:8,objectFit:"cover"}}/>}</div>
            <button style={{...S.btn,background:t.accent,color:"#fff",border:"none",width:"100%",marginTop:14,padding:"12px 0"}} onClick={addPerfume}>Add to Collection</button>
          </div>
        </div></div>
      )}

      {/* Grid */}
      <input style={S.search} type="text" placeholder="Search name, house, notes..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <select style={S.sel} value={houseFilter} onChange={e=>setHouseFilter(e.target.value)}>{houses.map(h => <option key={h} value={h}>{h==="All"?"All Houses":h}</option>)}</select>
        <select style={S.sel} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>{cats.map(c => <option key={c} value={c}>{c==="All"?"All Categories":c}</option>)}</select>
      </div>
      <div style={{marginBottom:8}}>
        <select style={{...S.sel,width:"100%"}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name-az">Sort: Name A-Z</option><option value="name-za">Sort: Name Z-A</option><option value="house-az">Sort: House A-Z</option>
          <option value="recently-used">Sort: Recently worn</option><option value="least-used">Sort: Least recently worn</option><option value="never-used">Sort: Never worn first</option>
        </select>
      </div>

      {archiveCount > 0 && (
        <div style={{marginBottom:14}}>
          <button onClick={() => { setShowArchived(!showArchived); setCatFilter("All"); setHouseFilter("All"); setSearch(""); }} style={{...S.btn,fontSize:11,padding:"6px 12px",background:showArchived?t.plum:"transparent",color:showArchived?"#fff":t.textMuted,borderColor:showArchived?t.plum:t.inputBorder}}>{showArchived ? "Back to Collection" : `Archive (${archiveCount})`}</button>
        </div>
      )}

      <div style={S.grid}>
        {sorted.map((p, idx) => {
          const phBg = placeholderColors[idx % placeholderColors.length];
          return (
          <div key={p.id} style={{...S.card,...(p.archived?{opacity:.7}:{})}} onClick={() => openDetail(p)}>
            {p.photoUrl ? <div style={{...S.cImgW,background:"#ffffff",display:"flex",alignItems:"center",justifyContent:"center"}}><img src={p.photoUrl} alt="" style={{width:"100%",height:"100%",objectFit:"contain",padding:8}}/></div>
            : <div style={{...S.cImgW,display:"flex",alignItems:"center",justifyContent:"center",background:phBg}}><span style={{fontSize:32,fontWeight:700,color:dark?"rgba(255,255,255,.25)":"rgba(85,62,78,.2)",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{p.name.charAt(0)}</span></div>}
            <div style={{padding:"10px 12px 12px"}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:t.textMuted,margin:"0 0 2px"}}>{p.house}</p>
              <p style={{fontSize:13,fontWeight:600,lineHeight:1.3,margin:0,color:t.text}}>{p.name}</p>
              {p.archived && p.archiveReason && <p style={{fontSize:10,color:t.textMuted,margin:"4px 0 0",fontStyle:"italic"}}>{p.archiveReason}</p>}
              {!p.archived && (p.categories||[]).length > 0 && <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>{p.categories.slice(0,2).map(c => { const cc = pickCat(c); return <span key={c} style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:cc.bg+"33",color:cc.color,fontWeight:600}}>{c}</span>; })}</div>}
              {!p.archived && p.lastUsed && <p style={{fontSize:10,color:t.textMuted,margin:"4px 0 0"}}>{formatDate(p.lastUsed)}</p>}
            </div>
          </div>
          );
        })}
      </div>
      {!filtered.length && <p style={{textAlign:"center",padding:40,color:t.textMuted,fontSize:14}}>No perfumes match your filters.</p>}
      <div style={{display:"flex",justifyContent:"center",gap:20,padding:"20px 0",fontSize:11,color:t.textMuted,fontWeight:500}}>
        <span>{activeCount} active</span><span>{archiveCount} archived</span>
      </div>

      {/* Chat bubble */}
      <button onClick={() => setShowChat(true)} style={{position:"fixed",bottom:28,right:20,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#553e4e 0%,#e0479e 100%)",border:"none",boxShadow:"0 4px 16px rgba(85,62,78,.4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900}}>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M20 2H4a2 2 0 00-2 2v12a2 2 0 002 2h4l4 4 4-4h4a2 2 0 002-2V4a2 2 0 00-2-2z" stroke="white" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>
      </button>

      {showChat && (
        <div style={{position:"fixed",inset:0,background:"rgba(42,30,36,.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={() => setShowChat(false)}>
          <div style={{background:t.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,height:"72vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 20px rgba(85,62,78,.2)"}} onClick={e => e.stopPropagation()}>
            <div style={{padding:"16px 18px 12px",borderBottom:"1px solid "+t.cardBorder,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{margin:0,fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',Georgia,serif",color:t.text}}>Fragrance Advisor</p>
                <p style={{margin:"2px 0 0",fontSize:11,color:t.textMuted}}>Recommendations from your collection</p>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {chatMessages.length > 0 && <button onClick={() => setChatMessages([])} style={{background:"none",border:"none",fontSize:11,color:t.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Clear</button>}
                <button onClick={() => setShowChat(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:t.textMuted,lineHeight:1}}>x</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:10}}>
              {chatMessages.length === 0 && <p style={{fontSize:13,color:t.textMuted,lineHeight:1.65,marginTop:8,textAlign:"center"}}>Tell me about the occasion, your mood, or the kind of scent you are after. I will recommend something from your collection.</p>}
              {chatMessages.map((m,i) => (
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"4px 16px 16px 16px",background:m.role==="user"?"linear-gradient(135deg,#553e4e,#e0479e)":t.pillBg,color:m.role==="user"?"#fff":t.text,fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              ))}
              {chatLoading && (
                <div style={{display:"flex",justifyContent:"flex-start"}}>
                  <div style={{padding:"10px 14px",borderRadius:"4px 16px 16px 16px",background:t.pillBg,display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0s infinite"}}/>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0.2s infinite"}}/>
                    <span style={{width:6,height:6,borderRadius:"50%",background:t.textMuted,display:"inline-block",animation:"chatDot 1.2s 0.4s infinite"}}/>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
            <div style={{padding:"12px 18px",borderTop:"1px solid "+t.cardBorder,display:"flex",gap:8,background:t.card}}>
              <input style={{...S.input,margin:0,flex:1,fontSize:13,padding:"10px 14px"}} placeholder="What are you looking for today?" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key==="Enter" && !e.shiftKey && sendChat()} disabled={chatLoading}/>
              <button onClick={sendChat} disabled={chatLoading || !chatInput.trim()} style={{padding:"10px 18px",borderRadius:10,border:"none",background:chatInput.trim()?"linear-gradient(135deg,#553e4e,#e0479e)":t.pillBg,color:chatInput.trim()?"#fff":t.textMuted,fontSize:13,fontWeight:600,cursor:chatInput.trim()?"pointer":"default",fontFamily:"'DM Sans',sans-serif"}}>Send</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
